spring.application.name=backend_instituciones

# ─── Datasource (Supabase PostgreSQL via pgBouncer) ─────────────────────────
spring.datasource.url=jdbc:postgresql://aws-1-us-east-2.pooler.supabase.com:6543/postgres
spring.datasource.username=postgres.ypfshplscauigbhixkky
spring.datasource.password=50563124asas@
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preferQueryMode=simple
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=HikariPool-LMS

#
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Puerto
server.port=${PORT:8081}
spring.mvc.async.request-timeout=300000

# Multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# ─── Supabase Auth (JWT validation via oauth2-resource-server) ───────────────
# Spring fetches JWKS from Supabase to validate incoming JWTs
# issuer-uri triggers OIDC discovery; fallback: use jwk-set-uri directly
# issuer-uri triggers lazy OIDC discovery → SocketTimeoutException on first request
# spring.security.oauth2.resourceserver.jwt.issuer-uri=${SUPABASE_AUTH_ISSUER:https://ypfshplscauigbhixkky.supabase.co/auth/v1}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWKS_URI:https://ypfshplscauigbhixkky.supabase.co/auth/v1/.well-known/jwks.json}

#Configuracion redis
spring.cache.type=redis
#management.health.redis.enabled=false
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
spring.data.redis.timeout=2000ms

#Configuracion RabbitMQ
spring.rabbitmq.addresses=${RABBITMQ_URL:amqp://guest:guest@localhost:5672}
spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.auto-startup=true
#Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Saas Core Configuration
saas.core.url=${SAAS_CORE_URL:http://localhost:8080}
saas.core.service-token=${SAAS_SERVICE_TOKEN:f7a3e9c2-4b81-4d6e-a05f-8c2d1e7b3f94}

# Supabase Storage
# =========================================================
# SUPABASE
# =========================================================
# URL BASE DEL PROYECTO
supabase.api-url=${SUPABASE_API_URL:https://ypfshplscauigbhixkky.supabase.co}
# STORAGE S3
supabase.storage-url=${SUPABASE_STORAGE_URL:https://ypfshplscauigbhixkky.storage.supabase.co/storage/v1/s3}
# PUBLIC ANON KEY (frontend/public auth)
supabase.anon-key=${SUPABASE_ANON_KEY:eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwZnNocGxzY2F1aWdiaGl4a2t5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5ODY4OTUsImV4cCI6MjA5MzU2Mjg5NX0.Lq_RZC-PejNZ6grlfL5qWXTbf5Mnzz6iSQgVC0UpgFw}
# SERVICE ROLE (SOLO backend interno)
supabase.service-key=${SUPABASE_SERVICE_KEY:eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwZnNocGxzY2F1aWdiaGl4a2t5Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Nzk4Njg5NSwiZXhwIjoyMDkzNTYyODk1fQ.IWt4jCiEUdDClTv3Dg7qthQx2mz173yyu2gOhxWsmcg}
# BUCKET
supabase.bucket=${SUPABASE_BUCKET:lms-assets}

#Rate limit
rate-limit.login.max-attempts=5
rate-limit.login.window-minutes=15

#Frontend URL
app.frontend-url=${FRONTEND_URL:http://localhost:5173,http://172.17.248.228:5173,http://172.17.248.228:3000, http://172.17.249.85:5173}

#Config de los Logs
logging.level.backend_instituciones=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.amqp=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

